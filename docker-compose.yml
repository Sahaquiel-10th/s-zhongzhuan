services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/super-relay.db
    ports:
      - "127.0.0.1:4173:4173"
    volumes:
      - super_relay_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  super_relay_data:
